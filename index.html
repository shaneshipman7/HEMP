<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas THC Response Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 750px;
  margin: auto;
  padding: 20px;
  background: #f4f4f4;
}
h1, h2 { text-align: center; }

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  font-size: 16px;
}

textarea {
  height: 260px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}

.primary { background: #2c7be5; color: white; }
.secondary { background: #28a745; color: white; }
.copy { background: #6c757d; color: white; }

a.button-link {
  display: block;
  text-align: center;
  padding: 12px;
  background: #ff9800;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  margin-top: 10px;
}

/* ✅ FIXED CHECKBOX ALIGNMENT */
.checkbox-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  cursor: pointer;
}

.checkbox-group input[type="checkbox"] {
  width: auto;
}
</style>
</head>

<body>

<h1>🚨 Texas THC Response Builder</h1>

<div class="box">
  <h2>Takes Less Than 60 Seconds</h2>
  <p>Most people won’t do this — which is exactly why it matters when you do.</p>

  <a class="button-link" href="https://wrm.capitol.texas.gov/home" target="_blank">
    🔎 Find Your Representatives
  </a>
</div>

<div class="box">
  <h2>Your Info</h2>

  <label>Your Name</label>
  <input id="name" placeholder="Tap and type your name">

  <label>Your City</label>
  <input id="city" value="Garland" onfocus="this.select()">

  <label>Representative / Senator Name</label>
  <input id="rep" value="Rep. Angie Chen Button / Sen. Bob Hall" onfocus="this.select()">

  <label>Your ZIP Code (optional)</label>
  <input id="zip" placeholder="Enter ZIP" onfocus="this.select()">

  <button onclick="lookupZip()" class="copy">Use ZIP to Find Reps</button>

  <label>Tone</label>
  <select id="tone">
    <option value="neutral">Neutral</option>
    <option value="firm">Firm</option>
    <option value="urgent">Urgent</option>
  </select>

  <label>What matters to you?</label>
  <div class="checkbox-group">
    <label><input type="checkbox" id="jobs"> Jobs / Employment</label>
    <label><input type="checkbox" id="business" checked> Small Businesses</label>
    <label><input type="checkbox" id="access"> Consumer Access</label>
    <label><input type="checkbox" id="fairness"> Fair Regulation</label>
    <label><input type="checkbox" id="fees" checked> Excessive Fees / Barriers to Entry</label>
    <label><input type="checkbox" id="safety"> Inconsistent Safety Standards</label>
  </div>

  <label>Personal Note (optional)</label>
  <input id="personal" placeholder="This impacts my community because...">
</div>

<div class="box">
  <h2>Your Message</h2>

  <button class="primary" onclick="generate()">Generate Message</button>

  <textarea id="output" placeholder="Your message will appear here..."></textarea>

  <button class="copy" onclick="copyText()">Copy</button>
  <button class="secondary" onclick="openEmail()">Open Email App</button>
  <button class="secondary" onclick="sendGarland()">Send to Garland Representatives</button>
</div>

<script>
function lookupZip() {
  let zip = document.getElementById("zip").value.trim();
  if (!zip) {
    alert("Enter a ZIP code first.");
    return;
  }
  window.open("https://wrm.capitol.texas.gov/home", "_blank");
}

function generate() {
  let name = document.getElementById("name").value.trim();
  let city = document.getElementById("city").value.trim();
  let rep = document.getElementById("rep").value.trim();
  let tone = document.getElementById("tone").value;
  let personal = document.getElementById("personal").value.trim();

  if (!rep) rep = "Representative";
  if (!city) city = "my community";
  if (!name) name = "A concerned constituent";

  let points = [];

  if (document.getElementById("jobs").checked)
    points.push("job losses across Texas");
  if (document.getElementById("business").checked)
    points.push("serious harm to small businesses");
  if (document.getElementById("access").checked)
    points.push("reduced consumer access");
  if (document.getElementById("fairness").checked)
    points.push("a lack of clear and consistent regulation");

  function formatList(arr) {
    if (arr.length === 1) return arr[0];
    if (arr.length > 1)
      return arr.slice(0, -1).join(", ") + ", and " + arr.slice(-1);
    return "";
  }

  let impact = points.length
    ? "These changes may result in " + formatList(points) + "."
    : "These changes are already creating uncertainty across Texas.";

  let feesText = document.getElementById("fees").checked ? `
I am also concerned that the current fee structure creates a barrier to entry that feels punitive and effectively becomes a “pay-to-play” system. This disproportionately impacts smaller businesses.
` : "";

  let safetyText = document.getElementById("safety").checked ? `
Additionally, it is difficult to understand why hemp-derived products are treated more strictly than substances like alcohol or acetaminophen, which have documented health risks.
` : "";

  let toneText =
    tone === "urgent"
      ? "I urge immediate action on this issue."
      : tone === "firm"
      ? "I strongly encourage action on this issue."
      : "I respectfully ask for your attention.";

  let personalText = personal ? personal + "\n\n" : "";

  let message = `Dear ${rep},

I am a constituent from ${city}, Texas, regarding the recent THC calculation change.

${impact}

${feesText}${safetyText}

${personalText}${toneText}

I ask for:
- Clear legislative guidance
- A reasonable transition period
- Consideration of economic impact
${document.getElementById("fees").checked ? "- A review of the fee structure affecting small businesses\n" : ""}

Thank you for your time and service.

Sincerely,
${name}`;

  document.getElementById("output").value = message;
}

function copyText() {
  let text = document.getElementById("output");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

function openEmail() {
  let body = encodeURIComponent(document.getElementById("output").value);
  let subject = encodeURIComponent("THC Regulation Concern");
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function sendGarland() {
  let message = document.getElementById("output").value;

  if (!message) {
    alert("Generate your message first.");
    return;
  }

  let body = encodeURIComponent(message);
  let subject = encodeURIComponent("THC Regulation Concern");

  window.location.href =
    "mailto:angie.button@house.texas.gov,bob.hall@senate.texas.gov?subject=" +
    subject + "&body=" + body;
}
</script>

</body>
</html>
