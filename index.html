<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas THC Response Builder</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 760px;
    margin: 0 auto;
    padding: 20px;
    background: #f4f4f4;
    line-height: 1.5;
  }

  h1, h2 {
    text-align: center;
    margin-bottom: 0.8em;
  }

  .box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  label {
    display: block;
    margin: 12px 0 4px;
    font-weight: 600;
    color: #333;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    margin-top: 4px;
    margin-bottom: 16px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
  }

  textarea {
    height: 260px;
    resize: vertical;
    font-family: inherit;
  }

  button {
    width: 100%;
    padding: 14px;
    margin: 10px 0 6px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
  }

  .primary   { background: #2c7be5; color: white; }
  .secondary { background: #28a745; color: white; }
  .copy      { background: #6c757d; color: white; }

  a.button-link {
    display: block;
    text-align: center;
    padding: 14px;
    background: #ff9800;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    margin: 16px 0;
    font-weight: 600;
  }

  /* ──────────────────────────────────────── */
  /* CUSTOM CHECKBOX - BEST ALIGNMENT FIX     */
  .checkbox-group {
    margin: 16px 0 24px 0;
  }

  .checkbox-group label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
    line-height: 1.45;
    padding: 4px 0;
  }

  .checkbox-group label:hover {
    background: rgba(44, 123, 229, 0.06);
    border-radius: 6px;
  }

  .checkbox-group input[type="checkbox"] {
    appearance: none;
    width: 20px;
    height: 20px;
    margin: 3px 0 0 0;          /* tiny top nudge for perfect centering */
    flex-shrink: 0;
    border: 2px solid #6c757d;
    border-radius: 4px;
    background: white;
    position: relative;
    cursor: pointer;
    transition: all 0.12s;
  }

  .checkbox-group input[type="checkbox"]:checked {
    background: #2c7be5;
    border-color: #2c7be5;
  }

  .checkbox-group input[type="checkbox"]:checked::after {
    content: "✔";
    position: absolute;
    left: 0;
    right: 0;
    top: -1px;                 /* fine-tune checkmark position if needed */
    color: white;
    font-size: 15px;
    line-height: 18px;
    text-align: center;
    font-weight: bold;
  }

  .checkbox-group input[type="checkbox"]:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.3);
  }
  /* ──────────────────────────────────────── */

  @media (max-width: 500px) {
    body { padding: 16px; }
    .box { padding: 16px; }
  }
</style>
</head>

<body>

<h1>🚨 Texas THC Response Builder</h1>

<div class="box">
  <h2>Takes Less Than 60 Seconds</h2>
  <p>Most people won’t do this — which is exactly why it matters when you do.</p>

  <a class="button-link" href="https://wrm.capitol.texas.gov/home" target="_blank" rel="noopener noreferrer">
    🔎 Find Your Representatives
  </a>
</div>

<div class="box">
  <h2>Your Info</h2>

  <label for="name">Your Name</label>
  <input id="name" placeholder="Tap and type your name" required>

  <label for="city">Your City</label>
  <input id="city" value="Garland" onfocus="this.select()">

  <label for="rep">Representative / Senator Name</label>
  <input id="rep" value="Rep. Angie Chen Button / Sen. Bob Hall" onfocus="this.select()">

  <label for="zip">Your ZIP Code (optional — can help confirm reps)</label>
  <input id="zip" placeholder="Enter ZIP" onfocus="this.select()">

  <button onclick="lookupZip()" class="copy">Use ZIP to Find Reps</button>

  <label for="tone">Tone</label>
  <select id="tone">
    <option value="neutral">Neutral</option>
    <option value="firm">Firm</option>
    <option value="urgent">Urgent</option>
  </select>

  <label>What matters to you most?</label>
  <div class="checkbox-group">
    <label><input type="checkbox" id="jobs"> Jobs / Employment</label>
    <label><input type="checkbox" id="business" checked> Small Businesses</label>
    <label><input type="checkbox" id="access"> Consumer Access</label>
    <label><input type="checkbox" id="fairness"> Fair Regulation</label>
    <label><input type="checkbox" id="fees" checked> Excessive Fees / Barriers to Entry</label>
    <label><input type="checkbox" id="safety"> Inconsistent Safety Standards</label>
  </div>

  <label for="personal">Personal Note (optional)</label>
  <input id="personal" placeholder="This impacts my community because...">
</div>

<div class="box">
  <h2>Your Message</h2>

  <button class="primary" onclick="generate()">Generate Message</button>

  <textarea id="output" placeholder="Your message will appear here..."></textarea>

  <button class="copy" onclick="copyText()">Copy to Clipboard</button>
  <button class="secondary" onclick="openEmail()">Open Email App</button>
  <button class="secondary" onclick="sendGarland()">Send to Garland Representatives</button>
</div>

<script>
function lookupZip() {
  let zip = document.getElementById("zip").value.trim();
  if (!zip) {
    alert("Please enter a ZIP code first.");
    return;
  }
  window.open("https://wrm.capitol.texas.gov/home", "_blank", "noopener,noreferrer");
}

function generate() {
  let name   = document.getElementById("name").value.trim()   || "A concerned constituent";
  let city   = document.getElementById("city").value.trim()   || "my community";
  let rep    = document.getElementById("rep").value.trim()    || "Representative";
  let tone   = document.getElementById("tone").value;
  let personal = document.getElementById("personal").value.trim();

  let points = [];
  if (document.getElementById("jobs").checked)     points.push("job losses across Texas");
  if (document.getElementById("business").checked) points.push("serious harm to small businesses");
  if (document.getElementById("access").checked)   points.push("reduced consumer access");
  if (document.getElementById("fairness").checked) points.push("a lack of clear and consistent regulation");

  function formatList(arr) {
    if (arr.length === 0) return "";
    if (arr.length === 1) return arr[0];
    return arr.slice(0, -1).join(", ") + ", and " + arr[arr.length - 1];
  }

  let impact = points.length
    ? "These changes may result in " + formatList(points) + "."
    : "These changes are already creating uncertainty across Texas.";

  let feesText = document.getElementById("fees").checked ? `
I am also concerned that the current fee structure creates a barrier to entry that feels punitive and effectively becomes a “pay-to-play” system. This disproportionately impacts smaller businesses.
` : "";

  let safetyText = document.getElementById("safety").checked ? `
Additionally, it is difficult to understand why hemp-derived products are treated more strictly than substances like alcohol or acetaminophen, which have documented health risks.
` : "";

  let toneText = tone === "urgent" ? "I urge immediate action on this issue."
               : tone === "firm"   ? "I strongly encourage action on this issue."
               : "I respectfully ask for your attention.";

  let personalText = personal ? personal + "\n\n" : "";

  let message = `Dear ${rep},

I am a constituent from ${city}, Texas, writing regarding the recent THC calculation change.

${impact}

\( {feesText} \){safetyText}

\( {personalText} \){toneText}

I respectfully ask for:
• Clear legislative guidance
• A reasonable transition period
• Consideration of economic impact
${document.getElementById("fees").checked ? "• A review of the fee structure affecting small businesses\n" : ""}

Thank you for your time and service to our community.

Sincerely,
${name}`;

  document.getElementById("output").value = message;
}

function copyText() {
  let textarea = document.getElementById("output");
  textarea.select();
  textarea.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("Message copied to clipboard!");
}

function openEmail() {
  let body = encodeURIComponent(document.getElementById("output").value);
  let subject = encodeURIComponent("Concern Regarding THC Regulation Changes");
  window.location.href = `mailto:?subject=\( {subject}&body= \){body}`;
}

function sendGarland() {
  let message = document.getElementById("output").value.trim();
  if (!message) {
    alert("Please generate your message first.");
    return;
  }
  let body = encodeURIComponent(message);
  let subject = encodeURIComponent("Concern Regarding THC Regulation Changes");
  window.location.href =
    "mailto:angie.button@house.texas.gov,bob.hall@senate.texas.gov" +
    "?subject=" + subject +
    "&body=" + body;
}
</script>

</body>
</html>
